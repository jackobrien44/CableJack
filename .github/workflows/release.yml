name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.0)'
        required: true

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          REPO_URL="https://github.com/jackobrien44/CableJack"

          link_prs() {
            sed -E "s|\(#([0-9]+)\)|([#\1](${REPO_URL}/pull/\1))|g"
          }

          if [ -z "$PREV_TAG" ]; then
            echo "## What's Changed" > notes.md
            echo "" >> notes.md
            git log HEAD --pretty=format:"- %s (%h)" --reverse | link_prs >> notes.md
          else
            echo "## What's Changed since ${PREV_TAG}" > notes.md
            echo "" >> notes.md
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --reverse | link_prs >> notes.md
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.event.inputs.version }} \
            --title "${{ github.event.inputs.version }}" \
            --notes-file notes.md \
            --latest

  package-tv:
    name: Package TV apps
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update versions
        run: |
          SEMVER="${{ github.event.inputs.version }}"
          SEMVER="${SEMVER#v}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$SEMVER\"/" webos/appinfo.json
          sed -i "s/version=\"[^\"]*\"/version=\"$SEMVER\"/" tizen/config.xml

      - name: Build Tizen .wgt
        run: bash scripts/build-tizen.sh

      - name: Install ares-cli
        run: npm install -g @webosose/ares-cli

      - name: Build WebOS .ipk
        run: bash scripts/build-webos.sh

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.inputs.version }} \
            tizen/CableJack.wgt \
            webos/*.ipk

  publish:
    name: Publish image
    needs: release
    uses: ./.github/workflows/publish-image.yml
    with:
      version: ${{ github.event.inputs.version }}
    permissions:
      contents: read
      packages: write
