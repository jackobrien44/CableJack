name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.0)'
        required: true

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "## What's Changed" > notes.md
            echo "" >> notes.md
            git log HEAD --pretty=format:"- %s (%h)" --reverse >> notes.md
          else
            echo "## What's Changed since ${PREV_TAG}" > notes.md
            echo "" >> notes.md
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --reverse >> notes.md
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.event.inputs.version }} \
            --title "${{ github.event.inputs.version }}" \
            --notes-file notes.md \
            --latest

  publish:
    name: Publish image
    needs: release
    uses: ./.github/workflows/publish-image.yml
    with:
      version: ${{ github.event.inputs.version }}
    permissions:
      contents: read
      packages: write
