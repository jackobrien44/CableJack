name: Publish Image

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        required: false
        type: string

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/cablejack

jobs:
  build-push:
    name: Build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Prepare tags
        id: meta
        run: |
          TAGS="${{ env.IMAGE }}:latest"
          if [ -n "${{ inputs.version }}" ]; then
            TAGS="$TAGS,${{ env.IMAGE }}:${{ inputs.version }}"
          else
            TAGS="$TAGS,${{ env.IMAGE }}:sha-${{ github.sha }}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
